schema: spec-driven

context: |
  Tech stack: Next.js (client) + Nest.js (api) + PostgreSQL + Prisma
  Architecture: /client + /api monorepo structure
  Git workflow: main + develop + feature/* (user manages PRs)
  Hosting: Vercel
  MVP: Product catalog + categories for esotericism shop
  Project name: Danse Macabre (slug: danse-macabre)

strict_tdd: true
strict_tdd_reason: User requested strict TDD for better code quality

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  status: to-be-detected
  note: "Test infrastructure will be set up during project initialization"

git:
  branches:
    - main
    - develop
    - feature/*
  workflow: User manages PRs, merges to develop, deploys from main

persistence:
  mode: hybrid (engram + openspec)
  engram_topic_key: sdd-init/danse-macabre
